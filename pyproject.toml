[project]
authors = [{name = "AmadFat", email = "1943269060@qq.com"}]
dependencies = [
    "xxhash>=3.5.0",
    "tensorboard",
    "tabulate",
    "alive-progress",
    "pillow>=11.2.1",
    "standard-imghdr>=3.13.0",
    "anytree>=2.13.0",
    "nvidia-dali-cuda120",
    "torch",
    "torchvision",
    "webdataset",
    "joblib>=1.5.0",
    "matplotlib>=3.10.3",
    "pyqt5>=5.15.11",
]
name = "nnaf"
requires-python = ">=3.11"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[[tool.uv.index]]
url = "https://pypi.nvidia.com"

[[tool.uv.index]]
url = "http://pypi.tuna.tsinghua.edu.cn/simple"
default = true
